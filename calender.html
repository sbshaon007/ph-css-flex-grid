<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calender</title>

    <style>

        .container{

            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap:10px;
            /* width: 1024px; */
            margin: 0 auto;
            grid-template-rows: 50px repeat(6, 100px);

        }

        .day, .week-day{


            background-color: pink;
            padding: 10px;
            font-size: 1.6rem;
            display: flex;
            justify-content: center;
            align-items: center;
            /* height: 50px; */
            border-radius: 5px;

        }

        .week-day{

            font-size:1.2rem;
            /* height: 30px; */
            background-color: rgb(179, 230, 230);

        }

    </style>


</head>
<body>

    <section>

        <div class="container">

            <div class="week-day">S</div>
            <div class="week-day">M</div>
            <div class="week-day">T</div>
            <div class="week-day">W</div>
            <div class="week-day">T</div>
            <div class="week-day">F</div>
            <div class="week-day">S</div>

            <div class="day">28</div>
            <div class="day">29</div>
            <div class="day">30</div>
            <div class="day">1</div>
            <div class="day">2</div>
            <div class="day">3</div>
            <div class="day">4</div>
            <div class="day">5</div>
            <div class="day">6</div>
            <div class="day">7</div>
            <div class="day">8</div>
            <div class="day">9</div>
            <div class="day">10</div>
            <div class="day">11</div>
            <div class="day">12</div>
            <div class="day">13</div>

            <div class="day">21</div>
            <div class="day">22</div>
            <div class="day">23</div>

</html>
